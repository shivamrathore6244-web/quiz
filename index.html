<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 90%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Secure Quiz Login</h2>
        <input type="email" id="email" placeholder="Enter Email" required><br>
        <input type="password" id="password" placeholder="Enter Password" required><br>
        <button id="loginBtn">Login to Start</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Aapka Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyAZozLE1yerbu4SmubWLtkOaoEMzTlJMto",
          authDomain: "jrf1-9b59f.firebaseapp.com",
          databaseURL: "https://jrf1-9b59f-default-rtdb.firebaseio.com",
          projectId: "jrf1-9b59f",
          storageBucket: "jrf1-9b59f.firebasestorage.app",
          messagingSenderId: "734906958129",
          appId: "1:734906958129:web:50953410fff51374b73010",
          measurementId: "G-JPFNJWDXF4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    // Sahi password dalne par quiz.html khulegi
                    window.location.href = "quiz.html";
                })
                .catch((error) => {
                    alert("Galat Email ya Password!");
                });
        });
    </script>
</body>
</html>
