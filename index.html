<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agriculture JRF Mock Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2d6a4f;
  --green-light: #40916c;
  --green-pale: #d8f3dc;
  --gold: #b5830a;
  --cream: #fefae0;
  --brown: #4a3728;
  --text: #1a2e1a;
  --muted: #6b7a6b;
  --border: #c8dfc8;
  --bg: #f5f9f0;
  --white: #ffffff;
  --correct: #2d6a4f;
  --wrong: #c0392b;
  --card-shadow: 0 2px 20px rgba(45,106,79,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Source Sans 3',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 60% 40% at 0% 0%, rgba(45,106,79,0.08) 0%, transparent 60%),
              radial-gradient(ellipse 50% 50% at 100% 100%, rgba(181,131,10,0.07) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
.screen { display:none; position:relative; z-index:1; }
.screen.active { display:block; }
.flex-center { display:flex; align-items:center; justify-content:center; flex-direction:column; min-height:100vh; }

/* HOME */
.home-wrap { max-width:560px; width:100%; margin:0 auto; padding:40px 24px; text-align:center; }
.badge { display:inline-block; background:var(--green); color:#fff; font-size:11px; letter-spacing:3px; font-weight:600; padding:6px 18px; border-radius:2px; margin-bottom:22px; text-transform:uppercase; }
.home-title { font-family:'Playfair Display',serif; font-size:clamp(32px,7vw,52px); color:var(--green); line-height:1.15; margin-bottom:10px; }
.home-sub { font-size:16px; color:var(--muted); line-height:1.7; margin-bottom:28px; }
.info-row { display:flex; gap:12px; justify-content:center; margin-bottom:32px; flex-wrap:wrap; }
.info-chip { background:var(--white); border:1px solid var(--border); border-radius:4px; padding:12px 20px; font-size:13px; color:var(--muted); }
.info-chip strong { display:block; font-size:22px; color:var(--green); font-family:'Playfair Display',serif; }
.name-section { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:28px 24px; margin-bottom:20px; text-align:left; box-shadow:var(--card-shadow); }
.name-section label { display:block; font-size:13px; font-weight:600; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.name-section input { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:4px; font-family:'Source Sans 3',sans-serif; font-size:16px; color:var(--text); background:var(--bg); outline:none; transition:border-color 0.2s; }
.name-section input:focus { border-color:var(--green); }
.btn-start { width:100%; padding:15px; background:var(--green); color:#fff; border:none; border-radius:5px; font-family:'Playfair Display',serif; font-size:19px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; box-shadow:0 4px 16px rgba(45,106,79,0.25); }
.btn-start:hover { background:var(--green-light); transform:translateY(-2px); }
.btn-start:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.admin-link { margin-top:18px; font-size:13px; color:var(--muted); }
.admin-link a { color:var(--green); text-decoration:none; font-weight:600; }
.error-box { background:#fdecea; border:1px solid #f5c6cb; border-radius:6px; padding:12px 16px; font-size:14px; color:var(--wrong); margin-bottom:14px; display:none; }

/* TEST SELECTOR */
.test-selector-wrap { max-width:560px; width:100%; margin:0 auto; padding:40px 24px; }
.test-selector-wrap h2 { font-family:'Playfair Display',serif; font-size:28px; color:var(--green); margin-bottom:8px; text-align:center; }
.test-selector-wrap p { font-size:14px; color:var(--muted); text-align:center; margin-bottom:28px; }
.test-list { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
.test-card { background:var(--white); border:1.5px solid var(--border); border-radius:8px; padding:18px 20px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--card-shadow); }
.test-card:hover { border-color:var(--green); transform:translateX(4px); }
.test-card.active-test { border-color:var(--green); background:var(--green-pale); }
.test-card-left .tc-num { font-size:11px; letter-spacing:2px; color:var(--gold); font-weight:600; text-transform:uppercase; margin-bottom:4px; }
.test-card-left .tc-title { font-weight:600; font-size:16px; color:var(--text); }
.test-card-left .tc-date { font-size:12px; color:var(--muted); margin-top:3px; }
.test-card-right { font-size:20px; }
.btn-take-test { width:100%; padding:14px; background:var(--green); color:#fff; border:none; border-radius:5px; font-family:'Playfair Display',serif; font-size:18px; cursor:pointer; transition:all 0.2s; }
.btn-take-test:hover { background:var(--green-light); }
.btn-take-test:disabled { opacity:0.5; cursor:not-allowed; }
.btn-back { background:transparent; border:1px solid var(--border); color:var(--muted); padding:10px 20px; border-radius:4px; font-size:14px; cursor:pointer; margin-top:10px; width:100%; transition:all 0.2s; }
.btn-back:hover { border-color:var(--green); color:var(--green); }

/* LOADING */
.loading-wrap { text-align:center; padding:40px 24px; }
.leaf-spin { width:52px; height:52px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 24px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--green); margin-bottom:12px; }
.loading-bar-wrap { width:280px; height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin:0 auto 12px; }
.loading-bar-fill { height:100%; background:var(--green); border-radius:3px; width:0%; transition:width 0.6s ease; }
.loading-status { font-size:14px; color:var(--muted); }

/* QUIZ */
.quiz-wrap { max-width:720px; margin:0 auto; padding:24px 20px 60px; }
.quiz-top { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.quiz-brand { font-family:'Playfair Display',serif; font-size:16px; color:var(--green); }
.score-pills { display:flex; gap:10px; }
.pill { background:var(--white); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:13px; color:var(--muted); }
.pill .n { font-weight:700; font-size:15px; }
.pill .n.g { color:var(--correct); }
.pill .n.r { color:var(--wrong); }
.progress-track { height:4px; background:var(--border); border-radius:2px; margin-bottom:6px; overflow:hidden; }
.progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.4s; }
.progress-label { font-size:12px; color:var(--muted); text-align:right; margin-bottom:20px; }
.timer-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.timer-text { font-size:13px; color:var(--muted); font-weight:600; white-space:nowrap; }
.timer-bar-wrap { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.timer-bar-fill { height:100%; background:var(--green); border-radius:2px; transition:width 1s linear, background 0.3s; }
.timer-bar-fill.warn { background:var(--gold); }
.timer-bar-fill.danger { background:var(--wrong); }
.q-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:28px; margin-bottom:18px; box-shadow:var(--card-shadow); animation:fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.q-meta { font-size:12px; letter-spacing:2px; color:var(--gold); font-weight:600; text-transform:uppercase; margin-bottom:10px; }
.q-text { font-size:18px; line-height:1.6; color:var(--text); font-weight:500; }
.options { display:grid; gap:10px; margin-bottom:16px; }
.opt-btn { background:var(--white); border:1.5px solid var(--border); border-radius:6px; padding:13px 16px; text-align:left; cursor:pointer; font-family:'Source Sans 3',sans-serif; font-size:15px; color:var(--text); display:flex; align-items:center; gap:12px; transition:all 0.15s; }
.opt-btn:hover:not(:disabled) { border-color:var(--green); background:var(--green-pale); transform:translateX(3px); }
.opt-btn:disabled { cursor:not-allowed; }
.opt-letter { min-width:28px; height:28px; border-radius:50%; background:var(--bg); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--muted); flex-shrink:0; transition:all 0.15s; }
.opt-btn:hover:not(:disabled) .opt-letter { background:var(--green); border-color:var(--green); color:#fff; }
.opt-btn.correct { border-color:var(--correct); background:#e8f5e9; }
.opt-btn.correct .opt-letter { background:var(--correct); border-color:var(--correct); color:#fff; }
.opt-btn.wrong { border-color:var(--wrong); background:#fdecea; }
.opt-btn.wrong .opt-letter { background:var(--wrong); border-color:var(--wrong); color:#fff; }
.opt-tick { margin-left:auto; font-size:16px; }
.explanation { background:linear-gradient(135deg,#f0faf4,#e8f5e9); border-left:4px solid var(--green); border-radius:0 6px 6px 0; padding:14px 18px; font-size:14px; color:var(--text); line-height:1.7; margin-bottom:14px; display:none; animation:fadeUp 0.3s ease; }
.explanation.show { display:block; }
.explanation strong { color:var(--green); }
.btn-next { width:100%; padding:13px; background:transparent; border:2px solid var(--green); color:var(--green); border-radius:5px; font-family:'Playfair Display',serif; font-size:17px; cursor:pointer; transition:all 0.2s; display:none; }
.btn-next.show { display:block; }
.btn-next:hover { background:var(--green); color:#fff; }

/* RESULT */
.result-wrap { max-width:560px; margin:0 auto; padding:40px 24px; text-align:center; }
.result-circle { width:120px; height:120px; border-radius:50%; border:4px solid var(--green); display:flex; align-items:center; justify-content:center; flex-direction:column; margin:0 auto 24px; background:var(--white); box-shadow:var(--card-shadow); }
.result-pct { font-family:'Playfair Display',serif; font-size:32px; color:var(--green); line-height:1; }
.result-out { font-size:11px; color:var(--muted); margin-top:3px; }
.result-title { font-family:'Playfair Display',serif; font-size:28px; color:var(--text); margin-bottom:6px; }
.result-sub { font-size:15px; color:var(--muted); margin-bottom:28px; }
.result-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:28px; }
.r-stat { background:var(--white); border:1px solid var(--border); border-radius:6px; padding:16px 8px; }
.r-stat .rn { font-family:'Playfair Display',serif; font-size:30px; }
.r-stat:nth-child(1) .rn { color:var(--correct); }
.r-stat:nth-child(2) .rn { color:var(--wrong); }
.r-stat:nth-child(3) .rn { color:var(--gold); }
.r-stat .rl { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
.saved-note { background:var(--green-pale); border:1px solid var(--border); border-radius:6px; padding:14px 18px; font-size:14px; color:var(--green); margin-bottom:20px; }
.btn-home { width:100%; padding:13px; background:var(--green); color:#fff; border:none; border-radius:5px; font-family:'Playfair Display',serif; font-size:17px; cursor:pointer; transition:all 0.2s; }
.btn-home:hover { background:var(--green-light); }

/* ADMIN LOGIN */
.admin-pass-wrap { max-width:380px; margin:0 auto; padding:40px 24px; text-align:center; }
.admin-pass-wrap h2 { font-family:'Playfair Display',serif; font-size:26px; color:var(--green); margin-bottom:8px; }
.admin-pass-wrap p { font-size:14px; color:var(--muted); margin-bottom:24px; }
.pass-input { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:4px; font-family:'Source Sans 3',sans-serif; font-size:16px; color:var(--text); background:var(--bg); outline:none; margin-bottom:12px; transition:border-color 0.2s; }
.pass-input:focus { border-color:var(--green); }
.pass-err { font-size:13px; color:var(--wrong); margin-bottom:12px; display:none; }
.btn-enter { width:100%; padding:13px; background:var(--green); color:#fff; border:none; border-radius:5px; font-family:'Playfair Display',serif; font-size:17px; cursor:pointer; transition:background 0.2s; }
.btn-enter:hover { background:var(--green-light); }

/* ADMIN PANEL */
.admin-wrap { max-width:1000px; margin:0 auto; padding:30px 20px 60px; }
.admin-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.admin-title { font-family:'Playfair Display',serif; font-size:28px; color:var(--green); }
.admin-sub { font-size:14px; color:var(--muted); margin-top:4px; }
.admin-btns { display:flex; gap:10px; flex-wrap:wrap; }
.btn-refresh { background:var(--green); color:#fff; border:none; padding:10px 22px; border-radius:4px; font-size:14px; cursor:pointer; transition:background 0.2s; }
.btn-refresh:hover { background:var(--green-light); }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--muted); padding:10px 22px; border-radius:4px; font-size:14px; cursor:pointer; transition:all 0.2s; }
.btn-secondary:hover { border-color:var(--green); color:var(--green); }

/* Admin Test Tabs */
.test-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.test-tab { padding:8px 18px; border:1.5px solid var(--border); border-radius:20px; font-size:13px; cursor:pointer; background:var(--white); color:var(--muted); transition:all 0.2s; }
.test-tab.active { background:var(--green); border-color:var(--green); color:#fff; }
.test-tab:hover:not(.active) { border-color:var(--green); color:var(--green); }

.stats-banner { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
.s-card { background:var(--white); border:1px solid var(--border); border-radius:6px; padding:18px 14px; text-align:center; box-shadow:var(--card-shadow); }
.s-card .sn { font-family:'Playfair Display',serif; font-size:28px; color:var(--green); }
.s-card .sl { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
.participants-table { background:var(--white); border:1px solid var(--border); border-radius:8px; overflow:hidden; box-shadow:var(--card-shadow); }
.table-head { background:var(--green); color:#fff; display:grid; grid-template-columns:40px 1fr 100px 80px 80px 100px; padding:12px 20px; font-size:12px; letter-spacing:1px; font-weight:600; text-transform:uppercase; }
.participant-row { display:grid; grid-template-columns:40px 1fr 100px 80px 80px 100px; padding:14px 20px; border-bottom:1px solid var(--border); align-items:center; cursor:pointer; transition:background 0.15s; }
.participant-row:last-child { border-bottom:none; }
.participant-row:hover { background:var(--bg); }
.rank { font-weight:700; color:var(--gold); font-family:'Playfair Display',serif; }
.p-name { font-weight:600; }
.p-test { font-size:12px; color:var(--muted); }
.p-score { font-family:'Playfair Display',serif; font-size:17px; color:var(--green); font-weight:700; }
.p-correct { color:var(--correct); font-weight:600; }
.p-wrong { color:var(--wrong); font-weight:600; }
.p-pct { background:var(--green-pale); color:var(--green); border-radius:12px; padding:3px 10px; font-size:13px; font-weight:600; text-align:center; display:inline-block; }
.p-pct.low { background:#fdecea; color:var(--wrong); }
.p-pct.mid { background:#fff8e1; color:var(--gold); }
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:16px; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:var(--white); border-radius:10px; max-width:650px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:fadeUp 0.3s ease; }
.modal-head { position:sticky; top:0; background:var(--green); color:#fff; padding:18px 24px; display:flex; justify-content:space-between; align-items:center; }
.modal-head h3 { font-family:'Playfair Display',serif; font-size:20px; }
.modal-close { background:rgba(255,255,255,0.2); border:none; color:#fff; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:rgba(255,255,255,0.4); }
.modal-body { padding:20px 24px; }
.modal-score-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.ms-chip { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 16px; font-size:14px; }
.ms-chip strong { display:block; font-size:20px; font-family:'Playfair Display',serif; }
.ms-chip strong.g { color:var(--correct); }
.ms-chip strong.r { color:var(--wrong); }
.ms-chip strong.b { color:var(--green); }
.answer-item { border:1px solid var(--border); border-radius:6px; padding:12px 16px; margin-bottom:10px; font-size:14px; }
.answer-item.correct { border-color:var(--correct); background:#f0faf4; }
.answer-item.wrong { border-color:var(--wrong); background:#fdecea; }
.answer-item.skipped { border-color:var(--gold); background:#fffbf0; }
.ai-num { font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:4px; font-weight:600; }
.ai-q { font-weight:600; color:var(--text); margin-bottom:6px; line-height:1.5; }
.ai-ans { font-size:13px; line-height:1.6; }
.correct-ans { color:var(--correct); font-weight:600; }
.wrong-ans { color:var(--wrong); font-weight:600; }

/* ADD TEST MODAL */
.add-test-form { display:flex; flex-direction:column; gap:14px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:4px; font-family:'Source Sans 3',sans-serif; font-size:15px; color:var(--text); background:var(--bg); outline:none; transition:border-color 0.2s; }
.form-group input:focus, .form-group select:focus { border-color:var(--green); }
.btn-create-test { padding:13px; background:var(--green); color:#fff; border:none; border-radius:5px; font-family:'Playfair Display',serif; font-size:17px; cursor:pointer; transition:background 0.2s; }
.btn-create-test:hover { background:var(--green-light); }
.btn-create-test:disabled { opacity:0.5; cursor:not-allowed; }

@media(max-width:600px) {
  .stats-banner { grid-template-columns:1fr 1fr; }
  .table-head, .participant-row { grid-template-columns:30px 1fr 60px 70px; }
  .table-head>*:nth-child(4), .participant-row>*:nth-child(4),
  .table-head>*:nth-child(5), .participant-row>*:nth-child(5) { display:none; }
}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="flex-center">
    <div class="home-wrap">
      <div class="badge">Mock Test Series</div>
      <h1 class="home-title">Agriculture JRF<br>Practice Test</h1>
      <p class="home-sub">JRF level questions on Agronomy, Soil Science, Plant Pathology, Horticulture & more.</p>
      <div class="info-row">
        <div class="info-chip"><strong>50</strong>Questions</div>
        <div class="info-chip"><strong>4</strong>Options</div>
        <div class="info-chip"><strong>30s</strong>Per Q</div>
        <div class="info-chip"><strong>Free</strong>Mock Test</div>
      </div>
      <div class="name-section">
        <label>Your Full Name</label>
        <input type="text" id="participantName" placeholder="Enter your name to begin..." maxlength="60"/>
      </div>
      <div class="error-box" id="homeErr"></div>
      <button class="btn-start" id="startBtn"
